<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
  />
  <title>Shower Prototype Final Fixed</title>
  <style>
    :root {
      --text: #3b3b3b;
      --ring-track: rgba(120,120,120,0.78);
      --ring-fill: #d2b15a;
      --button-fill: rgba(255,255,255,0.03);
      --button-active: rgba(255,255,255,0.10);
      --shadow: 0 6px 14px rgba(0,0,0,0.04);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Arial, sans-serif;
      background: #ececec;
      touch-action: manipulation;
    }

    body {
      position: relative;
      color: var(--text);
    }

    canvas#fx {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 0;
      background: #ececec;
    }

    .ui {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 28px;
    }

    .layout {
      width: min(1280px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 72px;
    }

    .row {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 92px;
    }

    .mode {
      position: relative;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      touch-action: manipulation;
    }

    .mode:active {
      transform: scale(0.985);
    }

    .circle {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border-radius: 50%;
      background: var(--button-fill);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .large .circle {
      width: 276px;
      height: 276px;
    }

    .small .circle {
      width: 194px;
      height: 194px;
    }

    .label {
      position: relative;
      z-index: 2;
      white-space: pre-line;
      line-height: 1.28;
      font-weight: 500;
      color: rgba(58,58,58,0.96);
      padding: 14px;
    }

    .large .label {
      font-size: 26px;
    }

    .small .label {
      font-size: 22px;
    }

    .ring-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
      z-index: 1;
      overflow: visible;
    }

    .track {
      fill: none;
      stroke: var(--ring-track);
      stroke-width: 3.6;
    }

    .progress {
      fill: none;
      stroke: var(--ring-fill);
      stroke-width: 4.8;
      stroke-linecap: round;
      stroke-dasharray: 999;
      stroke-dashoffset: 999;
      transition: stroke 0.2s ease;
      filter: drop-shadow(0 0 2px rgba(210,177,90,0.35));
    }

    .inner-outline {
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px solid rgba(120,120,120,0.08);
      z-index: 0;
      pointer-events: none;
    }

    .mode.active .circle {
      background: var(--button-active);
    }

    .mode.active::after {
      content: "";
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      box-shadow: 0 0 0 8px rgba(210,177,90,0.06);
      pointer-events: none;
    }

    .mode.paused .progress {
      stroke: #9d9d9d;
    }

    .status {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 20;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      color: rgba(70,70,70,0.9);
      font-size: 14px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(120,120,120,0.12);
    }

    #resetBtn {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 30;
      border: 1px solid rgba(120,120,120,0.22);
      background: rgba(255,255,255,0.22);
      color: rgba(70,70,70,0.92);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.06);
    }

    #resetBtn:active {
      transform: scale(0.98);
    }

    @media (max-width: 1280px) {
      .row { gap: 54px; }
      .large .circle {
        width: 232px;
        height: 232px;
      }
      .small .circle {
        width: 170px;
        height: 170px;
      }
      .large .label { font-size: 22px; }
      .small .label { font-size: 19px; }
    }

    @media (max-width: 920px) {
      .layout { gap: 38px; }
      .row { gap: 22px; }
      .large .circle {
        width: 174px;
        height: 174px;
      }
      .small .circle {
        width: 132px;
        height: 132px;
      }
      .large .label { font-size: 18px; }
      .small .label { font-size: 16px; }
    }
  </style>
</head>

  <script>
    const MODE_NAMES = {
      quick: "Quick Refresh",
      standard: "Standard Shower",
      relax: "Relax Ritual",
      more: "1 More Minute",
      continuous: "Continuous",
      pause: "Pause"
    };

    const MODES = {
      quick: { duration: 210, audio: "audioQuick", visual: "quick" },
      standard: { duration: 360, audio: "audioStandard", visual: "standard" },
      relax: { duration: 600, audio: "audioRelax", visual: "relax" },
      more: { duration: 60, audio: "audioMore", visual: "more" },
      continuous: { duration: null, audio: null, visual: "continuous" }
    };

    const canvas = document.getElementById("fx");
    const ctx = canvas.getContext("2d");
    const buttons = [...document.querySelectorAll(".mode")];
    const statusText = document.getElementById("statusText");
    const resetBtn = document.getElementById("resetBtn");

    const audios = {
      audioQuick: document.getElementById("audioQuick"),
      audioStandard: document.getElementById("audioStandard"),
      audioRelax: document.getElementById("audioRelax"),
      audioMore: document.getElementById("audioMore")
    };

    let w = 0;
    let h = 0;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener("resize", resize);
    resize();

    function stopAllAudio() {
      Object.values(audios).forEach(a => {
        a.pause();
        a.currentTime = 0;
      });
    }

    async function playAudioById(id) {
      stopAllAudio();
      if (!id) return;
      const audio = audios[id];
      if (!audio) return;
      audio.loop = false;
      try {
        await audio.play();
      } catch (err) {
        console.warn("Audio play failed:", err);
      }
    }

    function pauseCurrentAudio() {
      const id = session.modeKey ? MODES[session.modeKey]?.audio : null;
      if (!id) return;
      const audio = audios[id];
      if (audio && !audio.paused) audio.pause();
    }

    function resumeCurrentAudio() {
      const id = session.modeKey ? MODES[session.modeKey]?.audio : null;
      if (!id) return;
      const audio = audios[id];
      if (audio) audio.play().catch(() => {});
    }

    let session = {
      modeKey: null,
      running: false,
      paused: false,
      continuous: false,
      duration: 0,
      elapsed: 0,
      activeButton: null
    };

    function resetSessionState() {
      session = {
        modeKey: null,
        running: false,
        paused: false,
        continuous: false,
        duration: 0,
        elapsed: 0,
        activeButton: null
      };
    }

    function getProgressCircle(button) {
      return button.querySelector(".progress");
    }

    function getCircumference(circle) {
      const r = Number(circle.getAttribute("r"));
      return 2 * Math.PI * r;
    }

    function resetRing(button) {
      const progress = getProgressCircle(button);
      const c = getCircumference(progress);
      progress.style.strokeDasharray = `${c}`;
      progress.style.strokeDashoffset = `${c}`;
      button.classList.remove("active", "paused");
    }

    function setRingProgress(button, ratio) {
      const progress = getProgressCircle(button);
      const c = getCircumference(progress);
      const offset = c * (1 - Math.max(0, Math.min(1, ratio)));
      progress.style.strokeDasharray = `${c}`;
      progress.style.strokeDashoffset = `${offset}`;
    }

    function resetAllButtons() {
      buttons.forEach(resetRing);
    }

    function getButtonByMode(modeKey) {
      return buttons.find(btn => btn.dataset.mode === modeKey);
    }

    function updateStatus() {
      if (!session.running) {
        statusText.textContent = "Idle";
        return;
      }
      if (session.paused) {
        statusText.textContent = `Paused · ${MODE_NAMES[session.modeKey]}`;
        return;
      }
      if (session.continuous) {
        statusText.textContent = `Running · ${MODE_NAMES[session.modeKey]} · Open`;
        return;
      }
      const remaining = Math.max(0, Math.ceil(session.duration - session.elapsed));
      const min = String(Math.floor(remaining / 60)).padStart(2, "0");
      const sec = String(remaining % 60).padStart(2, "0");
      statusText.textContent = `Running · ${MODE_NAMES[session.modeKey]} · ${min}:${sec}`;
    }

    function stopSession() {
      stopAllAudio();
      resetAllButtons();
      resetSessionState();
      updateStatus();
    }

    function completeSession() {
      stopAllAudio();
      if (session.activeButton) {
        session.activeButton.classList.remove("active", "paused");
        setRingProgress(session.activeButton, 1);
      }
      resetSessionState();
      updateStatus();
    }

    function startMode(modeKey) {
      const mode = MODES[modeKey];
      if (!mode) return;

      stopSession();

      const btn = getButtonByMode(modeKey);

      session.modeKey = modeKey;
      session.running = true;
      session.paused = false;
      session.continuous = mode.duration == null;
      session.duration = mode.duration ?? 0;
      session.elapsed = 0;
      session.activeButton = btn;

      btn.classList.add("active");
      setRingProgress(btn, 0);

      playAudioById(mode.audio);
      updateStatus();
    }

    function togglePause() {
      if (!session.running) return;

      session.paused = !session.paused;

      const pauseBtn = getButtonByMode("pause");
      if (session.paused) {
        session.activeButton?.classList.add("paused");
        pauseBtn?.classList.add("active");
        pauseCurrentAudio();
      } else {
        session.activeButton?.classList.remove("paused");
        pauseBtn?.classList.remove("active");
        resumeCurrentAudio();
      }
      updateStatus();
    }

    function fillGradient(stops) {
      const g = ctx.createLinearGradient(0, 0, w, h);
      for (const [p, c] of stops) g.addColorStop(p, c);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
    }

    function dynamicField(colors, speed, amp, swirl, blur, alpha, timeScale = 1) {
      ctx.save();
      ctx.filter = `blur(${blur}px)`;
      ctx.globalAlpha = alpha;

      const bands = 7;
      for (let i = 0; i < bands; i++) {
        const y1 = (i / bands) * h;
        const y2 = ((i + 1) / bands) * h;

        const tt = performance.now() * timeScale;

        const sx1 = Math.sin(tt * speed + i * 1.4) * amp;
        const sx2 = Math.cos(tt * speed * 0.88 + i * 1.17) * amp;
        const sx3 = Math.sin(tt * speed * 1.04 + i * 0.76) * amp;

        const sy1 = Math.cos(tt * speed * 0.93 + i * 0.8) * amp * 0.34 * swirl;
        const sy2 = Math.sin(tt * speed * 1.08 + i * 1.2) * amp * 0.28 * swirl;
        const sy3 = Math.cos(tt * speed * 1.15 + i * 1.6) * amp * 0.22 * swirl;
        const sy4 = Math.sin(tt * speed * 0.98 + i * 0.55) * amp * 0.30 * swirl;

        const grad = ctx.createLinearGradient(
          0 + sx1, y1 + sy1,
          w + sx2, y2 + sy2
        );
        grad.addColorStop(0, colors[i % colors.length]);
        grad.addColorStop(0.5, colors[(i + 1) % colors.length]);
        grad.addColorStop(1, colors[(i + 2) % colors.length]);

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(-220, y1 + sy1);
        ctx.bezierCurveTo(
          w * 0.18 + sx2 * 0.55, y1 + sy3 + Math.sin(tt * speed * 1.6 + i) * 42 * swirl,
          w * 0.52 + sx3 * 0.45, y2 - sy2 + Math.cos(tt * speed * 1.2 + i * 0.6) * 55 * swirl,
          w + 220, y2 + sy4
        );
        ctx.lineTo(w + 220, h + 220);
        ctx.lineTo(-220, h + 220);
        ctx.closePath();
        ctx.fill();
      }

      ctx.restore();
    }

    function addHighlightSweep(sweep, swirlFactor = 1, timeScale = 1) {
      ctx.save();
      ctx.filter = `blur(${sweep.blur}px)`;
      ctx.globalAlpha = sweep.alpha;
      ctx.strokeStyle = sweep.color;
      ctx.lineWidth = sweep.width;
      ctx.beginPath();

      const tt = performance.now() * timeScale;
      const yBase = h * sweep.y;

      for (let x = -120; x <= w + 120; x += 26) {
        const xx = x + Math.sin(tt * sweep.speed * 0.9 + x * 0.0016) * 20 * swirlFactor;
        const yy =
          yBase +
          Math.sin(x * 0.0038 + tt * sweep.speed) * (h * 0.055) * swirlFactor +
          Math.cos(x * 0.0022 + tt * sweep.speed * 0.84) * (h * 0.030) * swirlFactor +
          Math.sin(x * 0.0011 - tt * sweep.speed * 0.55) * (h * 0.018) * swirlFactor;

        if (x === -120) ctx.moveTo(xx, yy);
        else ctx.lineTo(xx, yy);
      }

      ctx.stroke();
      ctx.restore();
    }

    function addSoftVeil(alpha = 0.06) {
      ctx.save();
      ctx.globalCompositeOperation = "soft-light";
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fillRect(0, 0, w, h);
      ctx.restore();
    }

    function getVisualTimeScale(modeKey) {
      if (session.paused) return 0.02;
      switch (modeKey) {
        case "more": return 1.2;
        case "quick": return 1.0;
        case "standard": return 0.9;
        case "relax": return 0.75;
        case "continuous": return 0.55;
        default: return 0.4;
      }
    }

    function renderMode(modeKey) {
      const v = VISUALS[modeKey] || VISUALS.idle;
      const ts = getVisualTimeScale(modeKey);

      fillGradient(v.bg);
      dynamicField(v.field1, v.speed1, v.amp1, v.swirl, v.blur1, v.alpha1, ts);
      dynamicField(v.field2, v.speed2, v.amp2, v.swirl, v.blur2, v.alpha2, ts);
      addHighlightSweep(v.sweepA, v.swirl, ts);
      addHighlightSweep(v.sweepB, v.swirl * 0.9, ts);
      addSoftVeil(v.veil);
    }

    function bindTap(el, handler) {
      let touched = false;

      el.addEventListener("touchend", (e) => {
        e.preventDefault();
        touched = true;
        handler();
        setTimeout(() => { touched = false; }, 50);
      }, { passive: false });

      el.addEventListener("click", (e) => {
        if (touched) return;
        e.preventDefault();
        handler();
      });
    }

    buttons.forEach(button => {
      const key = button.dataset.mode;
      bindTap(button, () => {
        if (key === "pause") {
          togglePause();
        } else if (key === "more") {
          addOneMoreMinute();
        } else {
          startMode(key);
        }
      });
    });

    bindTap(resetBtn, () => {
      stopSession();
    });

    let lastFrameTs = 0;

    function updateSession(deltaSec) {
      if (!session.running || session.paused) return;
      if (session.continuous) return;

      session.elapsed += deltaSec;
      const ratio = session.elapsed / session.duration;
      if (session.activeButton) setRingProgress(session.activeButton, ratio);

      if (ratio >= 1) {
        completeSession();
      }
    }

    function renderFrame(ts) {
      const delta = lastFrameTs ? (ts - lastFrameTs) / 1000 : 0;
      lastFrameTs = ts;

      updateSession(delta);
      renderMode(session.running ? session.modeKey : "idle");
      updateStatus();

      requestAnimationFrame(renderFrame);
    }

    resetAllButtons();
    updateStatus();
    requestAnimationFrame(renderFrame);
  </script>
</body>
</html>
